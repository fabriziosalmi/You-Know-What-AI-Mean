name: Markdown lint

on:
  push:
    branches: [main]
    paths:
      - '**.md'
      - '.markdownlint.yaml'
      - '.github/workflows/markdownlint.yml'
  pull_request:
    paths:
      - '**.md'
      - '.markdownlint.yaml'

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          globs: '**/*.md'
